<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Echo AI</title>
    <style>
        /* Jouw Signature Neon Theme */
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background-color: #333333;
            color: #f0f0f0;
            display: flex;
            min-height: 100vh;
        }

        /* Sidebar Styling */
        .sidebar {
            width: 260px;
            background-color: #1a1a1a;
            border-right: 1px solid rgba(0, 240, 255, 0.3);
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            box-shadow: 5px 0 15px rgba(0, 0, 0, 0.5);
        }

        .sidebar h2 {
            font-size: 22px;
            color: #00f0ff;
            text-shadow: 0 0 5px rgba(0, 240, 255, 0.7);
            margin-bottom: 30px;
            text-align: center;
        }

        .sidebar hr {
            border: 0;
            border-top: 1px solid rgba(0, 240, 255, 0.2);
            margin: 20px 0;
        }

        .sidebar a {
            color: #cccccc;
            text-decoration: none;
            padding: 12px;
            border-radius: 4px;
            transition: 0.3s;
            margin-bottom: 10px;
            display: block;
        }

        .sidebar a:hover {
            color: #00f0ff;
            background: rgba(0, 240, 255, 0.1);
            text-shadow: 0 0 5px rgba(0, 240, 255, 0.5);
        }

        /* Stats Cards */
        .stats-container {
            display: flex;
            gap: 20px;
            margin-bottom: 25px;
        }

        .stat-card {
            background: #1a1a1a;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid rgba(0, 240, 255, 0.2);
            flex: 1;
            text-align: center;
        }

        .stat-value {
            display: block;
            font-size: 24px;
            color: #00f0ff;
            font-weight: bold;
        }

        .stat-label {
            font-size: 12px;
            color: #888;
            text-transform: uppercase;
        }

        /* Main Content */
        .main-content {
            flex-grow: 1;
            padding: 40px;
            background-color: #333333;
        }

        .card {
            background-color: #1a1a1a;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.7);
            border: 1px solid rgba(0, 240, 255, 0.3);
        }

        h2 {
            color: #00f0ff;
            text-shadow: 0 0 5px rgba(0, 240, 255, 0.7);
            margin-top: 0;
        }

        /* Inputs & Selects */
        #userSearch, .modal-input {
            width: 100%;
            padding: 12px;
            background: #111;
            border: 1px solid rgba(0, 240, 255, 0.3);
            border-radius: 4px;
            color: #00f0ff;
            outline: none;
            box-sizing: border-box;
        }

        /* Table Styling */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 25px;
            color: #f0f0f0;
        }

        th {
            text-align: left;
            padding: 15px;
            border-bottom: 2px solid rgba(0, 240, 255, 0.3);
            color: #00f0ff;
            text-transform: uppercase;
            font-size: 14px;
        }

        td {
            padding: 15px;
            border-bottom: 1px solid #444;
            font-size: 15px;
        }

        /* Badges */
        .badge {
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 12px;
            text-transform: uppercase;
        }
        .badge.admin {
            background: rgba(0, 240, 255, 0.1);
            color: #00f0ff;
            border: 1px solid #00f0ff;
        }
        .badge.user {
            background: rgba(0, 255, 0, 0.1);
            color: #00ff00;
            border: 1px solid #00ff00;
        }

        /* Buttons */
        .btn-page, .btn-add {
            background: #222;
            border: 1px solid rgba(0, 240, 255, 0.3);
            color: #ccc;
            padding: 8px 14px;
            cursor: pointer;
            border-radius: 4px;
            transition: 0.3s;
        }

        .btn-page.active { background: #00f0ff; color: #111; }
        
        .btn-delete {
            background: transparent;
            color: #ff4d4d;
            border: 1px solid #ff4d4d;
            padding: 6px 12px;
            cursor: pointer;
            border-radius: 4px;
        }

        .logout-btn {
            margin-top: auto;
            color: #ff4d4d !important;
            border: 1px solid #ff4d4d;
            text-align: center;
        }

        /* Modal Background */
        .modal {
            display: none; 
            position: fixed; 
            z-index: 1000; 
            left: 0; top: 0; 
            width: 100%; height: 100%; 
            background: rgba(0,0,0,0.85);
        }
    </style>
</head>
<body>

<div class="sidebar">
    <h2>Admin Database</h2>
    <p style="font-size: 14px; color: #888;">Ingelogd als: <br><span id="adminName" style="color: #00f0ff; font-weight: bold;">...</span></p>
    <hr>
    <a href="profiel.html">👤 My Profile</a>
    <a href="index.html">🏠 Home</a>
    <a href="#" onclick="performLogout()" class="logout-btn">🚪 Logout</a>
</div>

<div class="main-content">
    <div class="stats-container">
        <div class="stat-card">
            <span id="totalUsersCount" class="stat-value">0</span>
            <span class="stat-label">Gebruikers</span>
        </div>
        <div class="stat-card">
            <span id="adminCount" class="stat-value">0</span>
            <span class="stat-label">Admins</span>
        </div>
        <div class="stat-card">
            <span class="stat-value" style="color: #00ff00;">Online</span>
            <span class="stat-label">Systeem Status</span>
        </div>
    </div>

    <div class="card">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h2>Gebruikersbeheer</h2>
            <button onclick="openAddUserModal()" class="btn-add" style="background: #00f0ff; color: #111; font-weight: bold;">+ NIEUW</button>
        </div>
        
        <input type="text" id="userSearch" placeholder="Zoek op naam of e-mail..." style="margin-top: 20px;">

        <table id="userTable">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Gebruikersnaam</th>
                    <th>Email</th>
                    <th>Status</th>
                    <th>Acties</th>
                </tr>
            </thead>
            <tbody id="userTableBody"></tbody>
        </table>

        <div id="pagination" class="pagination-container"></div>
    </div>
</div>

<div id="addUserModal" class="modal">
    <div class="card" style="width: 400px; margin: 80px auto;">
        <h2>Gebruiker Toevoegen</h2>
        <div style="display: flex; flex-direction: column; gap: 15px; margin-top: 20px;">
            <input type="text" id="newUsername" class="modal-input" placeholder="Gebruikersnaam">
            <input type="email" id="newEmail" class="modal-input" placeholder="Email">
            <input type="password" id="newPassword" class="modal-input" placeholder="Wachtwoord">
            <select id="newRole" class="modal-input">
                <option value="User">User</option>
                <option value="Admin">Admin</option>
            </select>
            <div style="display: flex; gap: 10px; margin-top: 10px;">
                <button onclick="saveNewUser()" class="btn-add" style="flex: 1; background: #00f0ff; color: #111;">Opslaan</button>
                <button onclick="closeAddUserModal()" class="btn-add" style="flex: 1;">Annuleren</button>
            </div>
        </div>
    </div>
</div>

<script src="admin-script.js"></script>
</body>
</html>
