<div class="card">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
        <h2 class="neon-text">Gebruikersbeheer</h2>
        <button onclick="openAddUserModal()" class="luxe-add-btn">+ NIEUWE KLANT</button>
    </div>
    
    <div class="search-wrapper">
        <span class="search-icon">🔍</span>
        <input type="text" id="userSearch" placeholder="Zoek op naam, e-mail of ID..." class="luxe-search">
        <div class="search-glow"></div>
    </div>

    <div class="table-responsive">
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Klantnaam</th>
                    <th>E-mailadres</th>
                    <th>Status</th>
                    <th>Beheer</th>
                </tr>
            </thead>
            <tbody id="userTableBody">
                </tbody>
        </table>
    </div>

    <div id="pagination" class="pagination-container"></div>
</div>
