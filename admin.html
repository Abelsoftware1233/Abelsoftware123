<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Echo AI</title>
    
    <script src="database.js"></script>
    <script src="admin-script.js"></script>

    <style>
        /* Jouw Signature Neon Theme - Hersteld & Compact */
        body { font-family: Arial, sans-serif; margin: 0; background-color: #1a1a1a; color: #f0f0f0; display: flex; min-height: 100vh; }
        .sidebar { width: 260px; background-color: #111; border-right: 1px solid rgba(0, 240, 255, 0.3); padding: 30px 20px; display: flex; flex-direction: column; box-shadow: 5px 0 15px rgba(0, 0, 0, 0.5); position: sticky; top: 0; height: 100vh; box-sizing: border-box; }
        .sidebar h2 { font-size: 22px; color: #00f0ff; text-shadow: 0 0 10px rgba(0, 240, 255, 0.7); margin-bottom: 30px; text-align: center; }
        .sidebar hr { border: 0; border-top: 1px solid rgba(0, 240, 255, 0.2); margin: 20px 0; }
        .sidebar a { color: #cccccc; text-decoration: none; padding: 12px; border-radius: 4px; transition: 0.3s; margin-bottom: 10px; display: block; }
        .sidebar a:hover { color: #00f0ff; background: rgba(0, 240, 255, 0.1); }
        .main-content { flex-grow: 1; padding: 40px; background-color: #1a1a1a; }
        .stats-container { display: flex; gap: 20px; margin-bottom: 25px; }
        .stat-card { background: #222; padding: 15px; border-radius: 8px; border: 1px solid rgba(0, 240, 255, 0.2); flex: 1; text-align: center; }
        .stat-value { display: block; font-size: 24px; color: #00f0ff; font-weight: bold; }
        .card { background-color: #222; padding: 30px; border-radius: 8px; border: 1px solid rgba(0, 240, 255, 0.3); box-shadow: 0 0 15px rgba(0, 0, 0, 0.7); }
        h2 { color: #00f0ff; text-shadow: 0 0 5px rgba(0, 240, 255, 0.7); }

        /* COMPACTE TABEL (Foto 2 Stijl) */
        table { width: 100%; border-collapse: collapse; margin-top: 25px; }
        th { text-align: left; padding: 10px; border-bottom: 2px solid #00f0ff; color: #00f0ff; text-transform: uppercase; font-size: 13px; }
        
        /* Zorgt voor de compacte hoogte van de rijen */
        td { 
            padding: 6px 10px !important; 
            border-bottom: 1px solid #333; 
            font-size: 14px; 
            vertical-align: middle; 
        }
        
        /* KNOPPEN ONDER ELKAAR (btn-group) */
        .btn-group { 
            display: flex; 
            flex-direction: column; 
            gap: 2px; 
            width: 70px; 
        }
        
        .btn-edit, .btn-delete, .btn-reset { 
            background: none; 
            border: 1px solid; 
            padding: 2px 5px !important; 
            cursor: pointer; 
            border-radius: 4px; 
            font-size: 10px !important; 
            text-align: center; 
        }
        
        .btn-edit { border-color: #00f0ff; color: #00f0ff; }
        .btn-edit:hover { background: #00f0ff; color: #000; }
        .btn-reset { border-color: #ffa500; color: #ffa500; }
        .btn-reset:hover { background: #ffa500; color: white; }
        .btn-delete { border-color: #ff4d4d; color: #ff4d4d; }
        .btn-delete:hover { background: #ff4d4d; color: white; }

        .badge { padding: 4px 10px; border-radius: 4px; font-size: 12px; text-transform: uppercase; }
        .badge.admin { border: 1px solid #00f0ff; color: #00f0ff; background: rgba(0, 240, 255, 0.1); }
        .badge.user { border: 1px solid #00ff00; color: #00ff00; background: rgba(0, 255, 0, 0.1); }
        
        .logout-btn { margin-top: auto; color: #ff4d4d !important; border: 1px solid #ff4d4d; text-align: center; padding: 10px; border-radius: 4px; cursor: pointer; }
        .pagination { margin-top: 20px; display: flex; justify-content: center; gap: 5px; }
        .btn-page { background: #111; border: 1px solid #00f0ff; color: #00f0ff; padding: 8px 12px; cursor: pointer; border-radius: 4px; }
        .btn-page.active { background: #00f0ff; color: #000; font-weight: bold; }
        
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); }
        .modal-input { width: 100%; padding: 10px; margin-bottom: 10px; background: #111; border: 1px solid #00f0ff; color: white; border-radius: 4px; box-sizing: border-box; }
        #userSearch { width: 250px; padding: 8px; background: #111; border: 1px solid #00f0ff; color: white; border-radius: 4px; margin-right: 15px; }

        /* Log Sectie onderaan */
        .log-section { margin-top: 25px; padding: 20px; background: #111; border: 1px solid #333; border-radius: 8px; }
        .log-box { max-height: 150px; overflow-y: auto; font-family: monospace; font-size: 12px; color: #888; }
    </style>
</head>
<body>

<div class="sidebar">
    <h2>Abel Admin</h2>
    <p style="font-size: 14px; color: #888;">Ingelogd als: <br><span id="adminName" style="color: #00f0ff; font-weight: bold;">...</span></p>
    <hr>
    <a href="index.html">🏠 Home Dashboard</a>
    <a href="profiel.html">👤 My Profile</a>

 <a href="downloads.html" class="luxury-button highlight">🎮 My Games and Apps</a>
    </div>

 <a href="advertentie.html" class="luxury-button highlight">💶 Advertising On My Games</a>
    </div>

    <div onclick="performLogout()" class="logout-btn">🚪 Logout</div>
</div>

<div class="main-content">
    <div class="stats-container">
        <div class="stat-card"><span id="totalUsersCount" class="stat-value">0</span><span style="color:#888">Totaal Gebruikers</span></div>
        <div class="stat-card"><span id="adminCount" class="stat-value">0</span><span style="color:#888">Admins</span></div>
        <div class="stat-card"><span class="stat-value" style="color:#00ff00">Online</span><span style="color:#888">Systeem Status</span></div>
    </div>

    <div class="card">
        <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px;">
            <h2 style="margin:0;">Gebruikersbeheer</h2>
            <div style="display: flex; align-items: center;">
                <input type="text" id="userSearch" placeholder="Zoek op naam of email...">
                <button onclick="openAddUserModal()" style="background:#00f0ff; border:none; padding:10px 20px; border-radius:5px; cursor:pointer; font-weight:bold; color:#000;">+ NIEUW</button>
            </div>
        </div>
        
        <table id="userTable">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Username</th>
                    <th>Email</th>
                    <th>Rol</th>
                    <th style="width: 100px;">Acties</th>
                </tr>
            </thead>
            <tbody id="userTableBody"></tbody>
        </table>

        <div id="pagination" class="pagination"></div>
    </div>

    <div class="log-section">
        <h3 style="color: #00f0ff; margin-top: 0; font-size: 16px;">📜 Systeem Activiteit</h3>
        <div id="logTableBody" class="log-box"><i>Laden...</i></div>
    </div>
</div>

<div id="addUserModal" class="modal">
    <div class="card" style="width: 350px; margin: 100px auto;">
        <h3 style="color:#00f0ff;">Nieuwe Gebruiker</h3>
        <input type="text" id="newUsername" class="modal-input" placeholder="Gebruikersnaam">
        <input type="email" id="newEmail" class="modal-input" placeholder="Email">
        <input type="password" id="newPassword" class="modal-input" placeholder="Wachtwoord">
        <select id="newRole" class="modal-input">
            <option value="User">User</option>
            <option value="Admin">Admin</option>
        </select>
        <button onclick="saveNewUser()" style="width:100%; background:#00f0ff; padding:10px; border:none; margin-bottom:5px; cursor:pointer; font-weight:bold;">Opslaan</button>
        <button onclick="closeAddUserModal()" style="width:100%; background:#444; color:white; padding:10px; border:none; cursor:pointer;">Annuleren</button>
    </div>
</div>

<div id="editUserModal" class="modal">
    <div class="card" style="width: 350px; margin: 100px auto;">
        <h3 style="color:#00f0ff;">Bewerken</h3>
        <input type="hidden" id="editUserId">
        <input type="text" id="editUsername" class="modal-input" placeholder="Username">
        <input type="email" id="editEmail" class="modal-input" placeholder="Email">
        <select id="editRole" class="modal-input">
            <option value="User">User</option>
            <option value="Admin">Admin</option>
        </select>
        <button onclick="saveEditUser()" style="width:100%; background:#00f0ff; padding:10px; border:none; margin-bottom:5px; cursor:pointer; font-weight:bold;">Opslaan</button>
        <button onclick="closeEditModal()" style="width:100%; background:#444; color:white; padding:10px; border:none; cursor:pointer;">Annuleren</button>
    </div>
</div>

</body>
</html>
