<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Echo AI</title>
    <style>
        /* Jouw Signature Neon Theme */
        body { font-family: Arial, sans-serif; margin: 0; background-color: #1a1a1a; color: #f0f0f0; display: flex; min-height: 100vh; }
        .sidebar { width: 260px; background-color: #111; border-right: 1px solid rgba(0, 240, 255, 0.3); padding: 30px 20px; display: flex; flex-direction: column; box-shadow: 5px 0 15px rgba(0, 0, 0, 0.5); }
        .sidebar h2 { font-size: 22px; color: #00f0ff; text-shadow: 0 0 10px rgba(0, 240, 255, 0.7); margin-bottom: 30px; text-align: center; }
        .sidebar hr { border: 0; border-top: 1px solid rgba(0, 240, 255, 0.2); margin: 20px 0; }
        .sidebar a { color: #cccccc; text-decoration: none; padding: 12px; border-radius: 4px; transition: 0.3s; margin-bottom: 10px; display: block; }
        .sidebar a:hover { color: #00f0ff; background: rgba(0, 240, 255, 0.1); }
        .main-content { flex-grow: 1; padding: 40px; background-color: #1a1a1a; }
        .stats-container { display: flex; gap: 20px; margin-bottom: 25px; }
        .stat-card { background: #222; padding: 15px; border-radius: 8px; border: 1px solid rgba(0, 240, 255, 0.2); flex: 1; text-align: center; }
        .stat-value { display: block; font-size: 24px; color: #00f0ff; font-weight: bold; }
        .card { background-color: #222; padding: 30px; border-radius: 8px; border: 1px solid rgba(0, 240, 255, 0.3); box-shadow: 0 0 15px rgba(0, 0, 0, 0.7); }
        h2 { color: #00f0ff; text-shadow: 0 0 5px rgba(0, 240, 255, 0.7); }
        table { width: 100%; border-collapse: collapse; margin-top: 25px; }
        th { text-align: left; padding: 15px; border-bottom: 2px solid #00f0ff; color: #00f0ff; text-transform: uppercase; font-size: 13px; }
        td { padding: 15px; border-bottom: 1px solid #444; font-size: 14px; }
        .badge { padding: 4px 10px; border-radius: 4px; font-size: 12px; text-transform: uppercase; }
        .badge.admin { border: 1px solid #00f0ff; color: #00f0ff; background: rgba(0, 240, 255, 0.1); }
        .badge.user { border: 1px solid #00ff00; color: #00ff00; background: rgba(0, 255, 0, 0.1); }
        .btn-delete { background: none; border: 1px solid #ff4d4d; color: #ff4d4d; padding: 6px 12px; cursor: pointer; border-radius: 4px; }
        .btn-delete:hover { background: #ff4d4d; color: white; }
        .logout-btn { margin-top: auto; color: #ff4d4d !important; border: 1px solid #ff4d4d; text-align: center; padding: 10px; border-radius: 4px; }
        
        /* Paginering Styling */
        .pagination { margin-top: 20px; display: flex; justify-content: center; gap: 5px; }
        .btn-page { background: #111; border: 1px solid #00f0ff; color: #00f0ff; padding: 8px 12px; cursor: pointer; border-radius: 4px; }
        .btn-page.active { background: #00f0ff; color: #000; font-weight: bold; }
        .btn-page:disabled { opacity: 0.3; cursor: not-allowed; }

        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); }
        .modal-input { width: 100%; padding: 10px; margin-bottom: 10px; background: #111; border: 1px solid #00f0ff; color: white; border-radius: 4px; box-sizing: border-box; }
    </style>
</head>
<body>

<div class="sidebar">
    <h2>Abel Admin</h2>
    <p style="font-size: 14px; color: #888;">Ingelogd als: <br><span id="adminName" style="color: #00f0ff; font-weight: bold;">...</span></p>
    <hr>
    <a href="index.html">🏠 Home Dashboard</a>
    <a href="profiel.html">👤 My Profile</a>
    <a href="#" onclick="performLogout()" class="logout-btn">🚪 Logout</a>
</div>

<div class="main-content">
    <div class="stats-container">
        <div class="stat-card"><span id="totalUsersCount" class="stat-value">0</span><span style="color:#888">Gebruikers</span></div>
        <div class="stat-card"><span id="adminCount" class="stat-value">0</span><span style="color:#888">Admins</span></div>
        <div class="stat-card"><span class="stat-value" style="color:#00ff00">Online</span><span style="color:#888">Systeem Status</span></div>
    </div>

    <div class="card">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h2 style="margin:0;">Gebruikersbeheer</h2>
            <button onclick="openAddUserModal()" style="background:#00f0ff; border:none; padding:10px 20px; border-radius:5px; cursor:pointer; font-weight:bold; color:#000;">+ NIEUW</button>
        </div>
        
        <table id="userTable">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Username</th>
                    <th>Email</th>
                    <th>Rol</th>
                    <th>Actie</th>
                </tr>
            </thead>
            <tbody id="userTableBody"></tbody>
        </table>

        <div id="pagination" class="pagination"></div>
    </div>
</div>

<div id="addUserModal" class="modal">
    <div class="card" style="width: 350px; margin: 100px auto;">
        <h3>Nieuwe Gebruiker</h3>
        <input type="text" id="newUsername" class="modal-input" placeholder="Gebruikersnaam">
        <input type="email" id="newEmail" class="modal-input" placeholder="Email">
        <input type="password" id="newPassword" class="modal-input" placeholder="Wachtwoord">
        <select id="newRole" class="modal-input">
            <option value="User">User</option>
            <option value="Admin">Admin</option>
        </select>
        <button onclick="saveNewUser()" style="width:100%; background:#00f0ff; padding:10px; border:none; margin-bottom:5px; cursor:pointer; font-weight:bold;">Opslaan</button>
        <button onclick="closeAddUserModal()" style="width:100%; background:#444; color:white; padding:10px; border:none; cursor:pointer;">Annuleren</button>
    </div>
</div>

<script>
/**
 * 1. TOEGANGSCONTROLE & INITIALISATIE
 */
const currentUser = JSON.parse(localStorage.getItem('currentUser'));
const isLoggedIn = localStorage.getItem('isLoggedIn');
let currentPage = 1;
const rowsPerPage = 10;

// Strikte check
if (!isLoggedIn || !currentUser || (currentUser.username.toLowerCase() !== 'admin' && currentUser.username.toLowerCase() !== 'abelsoftware123_admin')) {
    alert("Toegang geweigerd!");
    window.location.href = 'profiel.html'; 
}

document.addEventListener('DOMContentLoaded', function() {
    document.getElementById('adminName').textContent = currentUser.username;
    checkAndGenerateUsers(); // Zorg dat de 500 klanten er zijn
    loadData();
});

/**
 * 2. DATA GENERATOR (500 ACCOUNTS)
 */
function checkAndGenerateUsers() {
    let users = JSON.parse(localStorage.getItem('echo_users'));
    if (!users || users.length < 10) {
        users = [
            { id: 1, username: 'Abelsoftware123_Admin', email: 'admin@abelsoftware.nl', role: 'Admin' },
            { id: 2, username: 'admin', email: 'info@abelsoftware.nl', role: 'Admin' }
        ];
        const namen = ["Liam", "Noah", "Lucas", "Yara", "Finn", "Levi", "Zoe", "Mila", "James", "Sara", "Nora", "Hugo", "Liv", "Tess", "Evi", "Luca", "Xavi"];
        for (let i = 3; i <= 500; i++) {
            const n = namen[Math.floor(Math.random() * namen.length)];
            users.push({ id: i, username: n + i, email: n.toLowerCase() + i + "@echoai.com", role: 'User' });
        }
        localStorage.setItem('echo_users', JSON.stringify(users));
    }
}

/**
 * 3. RENDER LOGICA (10 PER PAGINA)
 */
function loadData() {
    const users = JSON.parse(localStorage.getItem('echo_users')) || [];
    document.getElementById('totalUsersCount').textContent = users.length;
    document.getElementById('adminCount').textContent = users.filter(u => u.role === 'Admin').length;

    const tbody = document.getElementById('userTableBody');
    tbody.innerHTML = '';

    // Bereken welke 10 we laten zien
    const start = (currentPage - 1) * rowsPerPage;
    const end = start + rowsPerPage;
    const paginatedUsers = users.slice(start, end);

    paginatedUsers.forEach(user => {
        const row = `<tr>
            <td>${user.id}</td>
            <td>${user.username}</td>
            <td>${user.email}</td>
            <td><span class="badge ${user.role.toLowerCase()}">${user.role}</span></td>
            <td>${(user.username.toLowerCase() !== 'admin' && user.username !== 'Abelsoftware123_Admin') ? 
                `<button class="btn-delete" onclick="deleteUser(${user.id})">Delete</button>` : 'Protected'}</td>
        </tr>`;
        tbody.innerHTML += row;
    });

    renderPagination(users.length);
}

function renderPagination(totalItems) {
    const totalPages = Math.ceil(totalItems / rowsPerPage);
    const container = document.getElementById('pagination');
    container.innerHTML = '';

    // Vorige knop
    let prevBtn = `<button class="btn-page" ${currentPage === 1 ? 'disabled' : ''} onclick="changePage(${currentPage - 1})">«</button>`;
    
    // Pagina nummers (beperkt tot 5 rondom huidige pagina)
    let start = Math.max(1, currentPage - 2);
    let end = Math.min(totalPages, currentPage + 2);
    
    let pagesHtml = '';
    for (let i = start; i <= end; i++) {
        pagesHtml += `<button class="btn-page ${i === currentPage ? 'active' : ''}" onclick="changePage(${i})">${i}</button>`;
    }

    // Volgende knop
    let nextBtn = `<button class="btn-page" ${currentPage === totalPages ? 'disabled' : ''} onclick="changePage(${currentPage + 1})">»</button>`;
    
    container.innerHTML = prevBtn + pagesHtml + nextBtn;
}

window.changePage = function(page) {
    currentPage = page;
    loadData();
}

/**
 * 4. ACTIES
 */
function deleteUser(id) {
    if (confirm("Gebruiker verwijderen?")) {
        let users = JSON.parse(localStorage.getItem('echo_users'));
        users = users.filter(u => u.id !== id);
        localStorage.setItem('echo_users', JSON.stringify(users));
        loadData();
    }
}

function openAddUserModal() { document.getElementById('addUserModal').style.display = 'block'; }
function closeAddUserModal() { document.getElementById('addUserModal').style.display = 'none'; }

function saveNewUser() {
    const u = document.getElementById('newUsername').value;
    const e = document.getElementById('newEmail').value;
    const p = document.getElementById('newPassword').value;
    const r = document.getElementById('newRole').value;
    if(!u || !p) return alert("Vul gegevens in!");

    let users = JSON.parse(localStorage.getItem('echo_users'));
    const newId = users.length > 0 ? Math.max(...users.map(u => u.id)) + 1 : 1;
    users.unshift({ id: newId, username: u, email: e, password: p, role: r });
    localStorage.setItem('echo_users', JSON.stringify(users));
    
    closeAddUserModal();
    loadData();
}

function performLogout() {
    localStorage.removeItem('isLoggedIn');
    localStorage.removeItem('currentUser');
    window.location.href = 'login.html';
}
</script>
</body>
</html>
