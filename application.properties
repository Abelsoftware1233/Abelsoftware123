# ===============================================
# 1. DATABASE CONFIGURATIE (POSTGRESQL)
# ===============================================

# De URL naar je database (zorg dat 'echo_ai_db' bestaat in PostgreSQL)
spring.datasource.url=jdbc:postgresql://localhost:5432/echo_ai_db

# Je database inloggegevens
spring.datasource.username=postgres
spring.datasource.password=jouw_wachtwoord

# De driver voor PostgreSQL
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/HIBERNATE: Update zorgt dat tabellen automatisch worden aangemaakt/bijgewerkt
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect


# ===============================================
# 2. NO-FOLDER STRUCTURE (ALLES IN DE MAIN MAP)
# ===============================================

# Vertel Thymeleaf dat de HTML bestanden direct in src/main/resources staan
spring.thymeleaf.prefix=classpath:/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML
spring.thymeleaf.cache=false

# Vertel Spring dat statische bestanden (JS/CSS) ook in de hoofdmap staan
spring.web.resources.static-locations=classpath:/


# ===============================================
# 3. SERVER EN LOGGING
# ===============================================

# De poort waarop je applicatie draait
server.port=8080

# Optioneel: Geeft meer info als er iets misgaat met de beveiliging
logging.level.org.springframework.security=INFO
