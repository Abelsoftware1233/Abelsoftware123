<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - Echo AI</title>
    
    <script src="database.js"></script>
    <script src="admin-script.js"></script>

    <style>
        /* Jouw Signature Neon Theme */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            background-color: #333333;
            color: #f0f0f0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .profile-container {
            background-color: #1a1a1a;
            color: #f0f0f0;
            padding: 30px;
            width: 100%;
            max-width: 450px;
            border-radius: 8px;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.7);
            border: 1px solid rgba(0, 240, 255, 0.3);
        }

        h2, h3 {
            color: #00f0ff;
            text-shadow: 0 0 10px rgba(0, 240, 255, 0.7);
            text-align: center;
        }

        h2 { font-size: 26px; margin-top: 0; margin-bottom: 20px; border-bottom: 1px solid rgba(0, 240, 255, 0.2); padding-bottom: 10px; }
        h3 { font-size: 18px; margin-top: 25px; }

        form { display: flex; flex-direction: column; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; color: #cccccc; font-size: 14px; }

        input {
            width: 100%;
            background-color: #2a2a2a;
            border: 1px solid #444;
            border-radius: 4px;
            padding: 12px;
            color: #fff;
            outline: none;
            transition: all 0.3s ease;
            box-sizing: border-box;
        }

        input:focus { border-color: #00f0ff; box-shadow: 0 0 8px rgba(0, 240, 255, 0.6); }

        button.save-btn {
            padding: 12px;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            color: #fff;
            background-color: transparent;
            box-shadow: 0 0 5px #00FFFF, 0 0 10px #00FFFF;
            border: 2px solid #00FFFF;
            margin-top: 20px;
            transition: 0.3s;
        }

        button.save-btn:hover { background: #00f0ff; color: #000; }

        hr { border: 0; border-top: 1px solid rgba(0, 240, 255, 0.2); margin: 25px 0; }

        /* LUXURY NAVIGATION */
        .luxury-nav-container { display: flex; flex-direction: column; gap: 12px; margin-top: 30px; align-items: center; }
        .luxury-button {
            text-decoration: none;
            color: #00f0ff;
            font-weight: bold;
            font-size: 13px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            display: block;
            width: 100%;
            box-sizing: border-box;
            padding: 14px;
            text-align: center;
            border: 1px solid #00f0ff;
            border-radius: 6px;
            background: rgba(0, 240, 255, 0.05);
            box-shadow: 0 0 8px rgba(0, 240, 255, 0.3);
            transition: 0.3s;
        }
        .luxury-button:hover { background: rgba(0, 240, 255, 0.2); transform: translateY(-2px); }
        .luxury-button.highlight { border-color: #ff4d4d; color: #ff4d4d; box-shadow: 0 0 8px rgba(255, 77, 77, 0.3); }

        .logout-link { display: block; text-align: center; margin-top: 20px; color: #ff4d4d; text-decoration: none; font-size: 14px; font-weight: bold; cursor: pointer; }
        .nav-links { text-align: center; margin-top: 15px; }
        .nav-links a { color: #00f0ff; text-decoration: none; font-size: 13px; }

        /* PROFILE PIC */
        .profile-pic-container { display: flex; flex-direction: column; align-items: center; margin-bottom: 25px; }
        .profile-circle {
            width: 120px; height: 120px; border-radius: 50%; border: 3px solid #00f0ff;
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.5); overflow: hidden;
            display: flex; justify-content: center; align-items: center; background-color: #2a2a2a; margin-bottom: 15px;
        }
        .profile-circle img { width: 100%; height: 100%; object-fit: cover; }
        .upload-btn { font-size: 12px; color: #00f0ff; cursor: pointer; border: 1px solid rgba(0, 240, 255, 0.5); padding: 5px 15px; border-radius: 20px; background: rgba(0, 240, 255, 0.1); }
    </style>
</head>
<body>

<div class="profile-container">
    <h2>👤 User Profile</h2>

    <form id="profileForm">
        <div class="profile-pic-container">
            <div class="profile-circle" id="profileCircle">
                <img src="https://via.placeholder.com/150" id="profilePreview" alt="Profile">
            </div>
            <label for="imageUpload" class="upload-btn">📸 Upload Foto</label>
            <input type="file" id="imageUpload" accept="image/*" style="display: none;">
        </div>

        <div class="form-group">
            <label>Username (Vast)</label>
            <input type="text" id="username" readonly style="opacity: 0.6; cursor: not-allowed;">
        </div>

        <div class="form-group">
            <label>First Name</label>
            <input type="text" id="firstName" placeholder="Your Name">
        </div>

        <div class="form-group">
            <label>Last Name</label>
            <input type="text" id="lastName" placeholder="Your Last Name">
        </div>

        <div class="form-group">
            <label>Email Address</label>
            <input type="email" id="email" required>
        </div>

        <hr>
        <h3>🔐 Password Change</h3>
        <div class="form-group">
            <label>New Password</label>
            <input type="password" id="newPassword" placeholder="Leave empty to keep current">
        </div>
        <div class="form-group">
            <label>Confirm New Password</label>
            <input type="password" id="confirmPassword">
        </div>

        <button onclick="saveProfileChanges()" class="save-btn">SAVE CHANGES</button>

    <div class="nav-links">
        <a href="admin.html" id="adminLink">← Back To Dashboard 💻</a>
    </div>

    <div class="luxury-nav-container">
        <a href="payments.html" class="luxury-button">🎮 PAYMENTS 💶</a>
        <a href="chatbot.html" class="luxury-button">🤖 CHATBOTS (AI) 🤖</a>
        <a href="emulator.html" class="luxury-button">🕹️ EMULATOR 🕹️</a>
        <a href="advertentie.html" class="luxury-button">💸 ADVERTISING 💸</a>
        <a href="downloads.html" class="luxury-button highlight">🎮 YOUR GAMES 🎮</a>
    </div>

    <span onclick="logout();" class="logout-link">🚪 Logout</span>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const currentUser = JSON.parse(localStorage.getItem('currentUser'));
    const isLoggedIn = localStorage.getItem('isLoggedIn');

    if (!isLoggedIn || !currentUser) {
        window.location.href = 'login.html';
        return;
    }

    // Alleen admin mag dashboard link zien
    if (currentUser.role !== 'Admin') {
        const adminLink = document.getElementById('adminLink');
        if(adminLink) adminLink.style.display = 'none';
    }

    // Data ophalen
    const allUsers = getStoredUsers();
    let userIndex = allUsers.findIndex(u => u.username.toLowerCase() === currentUser.username.toLowerCase());
    let userData = allUsers[userIndex];

    if (userData) {
        document.getElementById('username').value = userData.username;
        document.getElementById('email').value = userData.email || "";
        document.getElementById('firstName').value = userData.firstName || "";
        document.getElementById('lastName').value = userData.lastName || "";
        if (userData.profilePic) document.getElementById('profilePreview').src = userData.profilePic;
    }

    // Foto Upload
    document.getElementById('imageUpload').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = (event) => document.getElementById('profilePreview').src = event.target.result;
            reader.readAsDataURL(file);
        }
    });

    // Opslaan
    document.getElementById('profileForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const newPass = document.getElementById('newPassword').value;
        if (newPass && newPass !== document.getElementById('confirmPassword').value) {
            return alert("❌ Wachtwoorden komen niet overeen!");
        }

        allUsers[userIndex].email = document.getElementById('email').value;
        allUsers[userIndex].firstName = document.getElementById('firstName').value;
        allUsers[userIndex].lastName = document.getElementById('lastName').value;
        allUsers[userIndex].profilePic = document.getElementById('profilePreview').src;
        if (newPass) allUsers[userIndex].password = newPass;

        localStorage.setItem('echo_users', JSON.stringify(allUsers));
        alert("✅ Profiel succesvol bijgewerkt!");
    });
});

function logout() {
    localStorage.removeItem('isLoggedIn');
    localStorage.removeItem('currentUser');
    window.location.href = 'login.html';
}
</script>

</body>
</html>
