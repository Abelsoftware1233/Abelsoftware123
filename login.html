<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Abelsoftware123</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; background-color: #333; color: #f0f0f0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .content-section { background-color: #1a1a1a; padding: 30px; width: 100%; max-width: 400px; border-radius: 8px; box-shadow: 0 0 15px rgba(0, 0, 0, 0.7); border: 1px solid rgba(0, 240, 255, 0.3); }
        h2 { font-size: 24px; color: #00f0ff; text-shadow: 0 0 5px rgba(0, 240, 255, 0.7); text-align: center; }
        form { display: flex; flex-direction: column; }
        label { margin-bottom: 8px; font-weight: bold; color: #cccccc; }
        input { background-color: #2a2a2a; border: 1px solid #444; border-radius: 4px; padding: 12px; margin-bottom: 20px; color: #fff; outline: none; box-sizing: border-box; width: 100%; }
        input:focus { border-color: #00f0ff; box-shadow: 0 0 8px rgba(0, 240, 255, 0.4); }
        button { padding: 12px; border: 2px solid #00FFFF; border-radius: 5px; font-weight: bold; text-transform: uppercase; cursor: pointer; color: #fff; background-color: transparent; box-shadow: 0 0 10px #00FFFF; transition: 0.3s; }
        button:hover { background-color: #00FFFF; color: #000; box-shadow: 0 0 20px #00FFFF; }
        .error-msg { color: #ff4d4d; border: 1px solid #ff4d4d; padding: 10px; margin-bottom: 15px; display: none; text-align: center; background: rgba(255, 77, 77, 0.1); border-radius: 4px; }
        p a { color: #00f0ff; text-decoration: none; }
        p a:hover { text-decoration: underline; }
    </style>
</head>
<body>

<section class="content-section">
    <h2>🔒 Log In</h2>
    <div id="loginError" class="error-msg">❌ Gebruikersnaam of wachtwoord onjuist</div>
    <form id="loginForm">
        <label>Username</label>
        <input type="text" id="username" placeholder="Enter username" required>
        <label>Password</label>
        <input type="password" id="password" placeholder="••••••••" required>
        <button type="submit">Log In</button>
    </form>
    <p style="text-align:center;">Geen account? <a href="registreer.html">Registreer hier</a></p>
</section>

<script src="database.js"></script>
<script src="admin-script.js"></script>

<script>
    // 1. VOORKOM KICK-LOOP:
    // We wissen de sessie ZODRA de pagina laadt, zodat admin-script.js niet direct kickt.
    localStorage.removeItem('isLoggedIn');
    localStorage.removeItem('currentUser');

    document.getElementById('loginForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const errorDiv = document.getElementById('loginError');
        errorDiv.style.display = 'none';

        const userInp = document.getElementById('username').value.trim();
        const passInp = document.getElementById('password').value;

        // 2. MASTER LOGIN CHECK (Altijd prioriteit)
        if (userInp.toLowerCase() === "admin" && passInp === "admin1501") {
            localStorage.setItem('isLoggedIn', 'true');
            localStorage.setItem('currentUser', JSON.stringify({
                username: "System Admin", 
                role: "Admin"
            }));
            window.location.replace('admin.html');
            return;
        }

        // 3. DATABASE CHECK (Via getStoredUsers uit admin-script.js)
        // We gebruiken de functie getStoredUsers() omdat die ook de generator bevat
        const users = (typeof getStoredUsers === 'function') ? getStoredUsers() : [];
        const found = users.find(u => 
            u.username.toLowerCase() === userInp.toLowerCase() && 
            u.password === passInp
        );

        if (found) {
            localStorage.setItem('isLoggedIn', 'true');
            localStorage.setItem('currentUser', JSON.stringify({
                username: found.username, 
                role: found.role
            }));
            
            // Redirect naar juiste pagina
            if (found.role.toLowerCase() === 'admin') {
                window.location.replace('admin.html');
            } else {
                window.location.replace('profiel.html');
            }
        } else {
            errorDiv.style.display = 'block';
        }
    });
</script>
</body>
</html>
