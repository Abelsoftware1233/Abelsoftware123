<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Abelsoftware123</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; background-color: #333; color: #f0f0f0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .content-section { background-color: #1a1a1a; padding: 30px; width: 100%; max-width: 400px; border-radius: 8px; box-shadow: 0 0 15px rgba(0, 0, 0, 0.7); border: 1px solid rgba(0, 240, 255, 0.3); }
        h2 { color: #00f0ff; text-align: center; }
        form { display: flex; flex-direction: column; }
        label { margin-bottom: 8px; color: #ccc; }
        input { background: #2a2a2a; border: 1px solid #444; border-radius: 4px; padding: 12px; margin-bottom: 20px; color: #fff; }
        button { padding: 12px; border: 2px solid #00FFFF; border-radius: 5px; font-weight: bold; cursor: pointer; color: #fff; background: transparent; transition: 0.3s; }
        button:hover { background: #00FFFF; color: #000; box-shadow: 0 0 15px #00FFFF; }
        .back-link { display: block; text-align: center; margin-top: 20px; color: #00f0ff; text-decoration: none; }
    </style>
</head>
<body>
<section class="content-section">
    <h2>🔒 Log In</h2>
    <form id="loginForm">
        <label for="username">Username</label>
        <input type="text" id="username" required>
        <label for="password">Password</label>
        <input type="password" id="password" required>
        <button type="submit">Log In</button>
    </form>
    <a href="index.html" class="back-link">Return to Home</a>
</section>
<script src="login.js"></script>
</body>
</html>
