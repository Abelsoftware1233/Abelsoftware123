<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Abelsoftware123</title>
    <style>
        /* Exact jouw originele Neon Theme stijl */
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background-color: #333333;
            color: #f0f0f0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .content-section {
            background-color: #1a1a1a;
            color: #f0f0f0;
            padding: 30px;
            width: 100%;
            max-width: 400px;
            border-radius: 8px;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.7);
            border: 1px solid rgba(0, 240, 255, 0.3);
        }

        h2 {
            font-size: 24px;
            color: #00f0ff;
            text-shadow: 0 0 5px rgba(0, 240, 255, 0.7);
            margin-top: 0;
            margin-bottom: 20px;
            text-align: center;
        }

        form {
            display: flex;
            flex-direction: column;
        }

        label {
            margin-bottom: 8px;
            font-weight: bold;
            color: #cccccc;
        }

        input {
            background-color: #2a2a2a;
            border: 1px solid #444;
            border-radius: 4px;
            padding: 12px;
            margin-bottom: 20px;
            color: #fff;
            outline: none;
            transition: border 0.3s ease;
        }

        input:focus {
            border-color: #00f0ff;
            box-shadow: 0 0 5px rgba(0, 240, 255, 0.5);
        }

        button {
            padding: 12px;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            color: #fff;
            background-color: transparent;
            box-shadow: 0 0 5px #00FFFF, 
                        0 0 10px #00FFFF;
            border: 2px solid #00FFFF;
            transition: all 0.3s ease-in-out;
            margin-top: 10px;
        }

        button:hover {
            background-color: #00FFFF;
            color: #000;
            box-shadow: 0 0 15px #00FFFF, 
                        0 0 30px #00FFFF;
        }

        /* Status meldingen styling */
        #statusMessage {
            text-align: center;
            margin-bottom: 15px;
            padding: 10px;
            border-radius: 4px;
            display: none;
        }
        .error { color: #ff4d4d; border: 1px solid #ff4d4d; background: rgba(255, 77, 77, 0.1); }
        .success { color: #00ff00; border: 1px solid #00ff00; background: rgba(0, 255, 0, 0.1); }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: #00f0ff;
            text-decoration: none;
            font-size: 14px;
        }

        .back-link:hover {
            text-decoration: underline;
        }

        p {
            text-align: center;
            margin-top: 15px;
            font-size: 14px;
        }

        p a {
            color: #00f0ff;
            text-decoration: none;
        }
    </style>
</head>
<body>

<section class="content-section">
    <h2>Create Account</h2>
    
    <div id="statusMessage"></div>

    <form id="registrationForm">
        <label for="username">Username</label>
        <input type="text" id="username" placeholder="Enter username" required>
        
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="email@example.com" required>
        
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="••••••••" required>

        <label for="password_confirm">Confirm Password</label>
        <input type="password" id="password_confirm" placeholder="••••••••" required>

        <button type="submit" id="submitBtn">Register Now</button>
    </form>
 
    <p>
        Already have an account? <a href="login.html">Login here</a>
    </p>

    <a href="index.html" class="back-link">Return to Home</a>
</section>

<script src="script.js"></script>

</body>
</html>
